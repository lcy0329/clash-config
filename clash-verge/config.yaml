# ── 代理组（完整替换订阅自带代理组）────────────────────────────────────────
# include-all-providers: true  → 从 proxy-providers 拉取节点（原始订阅）
# include-all-proxies: true    → 从 proxies 列表拉取节点（subconverter 转换后的订阅）
# 两者同时写，兼容两种订阅形式

proxy-groups:

  # 顶层手动选择
  - name: 🚀 节点选择
    type: select
    include-all-providers: true
    include-all-proxies: true
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港自动
      - 🇯🇵 日本自动
      - 🇺🇸 美国自动
      - 🇸🇬 新加坡自动
      - DIRECT

  # 全局自动测速
  - name: ♻️ 自动选择
    type: url-test
    include-all-providers: true
    include-all-proxies: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  # ── 地区节点（url-test 自动选最快）──

  - name: 🇭🇰 香港自动
    type: url-test
    include-all-providers: true
    include-all-proxies: true
    filter: "(?i)(港|HK|Hong.?Kong|🇭🇰)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 🇯🇵 日本自动
    type: url-test
    include-all-providers: true
    include-all-proxies: true
    filter: "(?i)(日本|JP|Japan|Tokyo|Osaka|🇯🇵)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 🇺🇸 美国自动
    type: url-test
    include-all-providers: true
    include-all-proxies: true
    filter: "(?i)(美国|US|United.?States|Los.?Angeles|San.?Jose|Seattle|New.?York|🇺🇸)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 🇸🇬 新加坡自动
    type: url-test
    include-all-providers: true
    include-all-proxies: true
    filter: "(?i)(新加坡|SG|Singapore|狮城|🇸🇬)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  # ── 功能专用组 ──

  # AI：强制走美国（ChatGPT/Claude 对节点地区严格）
  - name: 🤖 AI服务
    type: select
    proxies:
      - 🇺🇸 美国自动
      - 🚀 节点选择

  # GitHub：优先日本低延迟，备选美国
  - name: 🐙 GitHub
    type: select
    proxies:
      - 🇯🇵 日本自动
      - 🇺🇸 美国自动
      - 🚀 节点选择

  # YouTube：日本/港/新优先（CDN 距离近，画质更稳）
  - name: 📹 YouTube
    type: select
    proxies:
      - 🇯🇵 日本自动
      - 🇭🇰 香港自动
      - 🇸🇬 新加坡自动
      - 🚀 节点选择

  # 流媒体（Netflix 等需要解锁节点时在此切换）
  - name: 🎬 流媒体
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港自动
      - 🇯🇵 日本自动
      - 🇸🇬 新加坡自动
      - 🇺🇸 美国自动

  - name: 📲 Telegram
    type: select
    proxies:
      - 🚀 节点选择
      - 🇸🇬 新加坡自动
      - 🇭🇰 香港自动

  # 微软/苹果/游戏：默认直连，需要时可切代理
  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🎮 游戏平台
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  # 功能组
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT

# ── 规则（完整替换，按优先级从高到低）──────────────────────────────────────

rules:

  # 本地网络直连（LAN/loopback，含 IP-CIDR，需 no-resolve）
  - RULE-SET,local_network,🎯 全球直连,no-resolve

  # 广告拦截
  - RULE-SET,ban_ad,🛑 广告拦截
  - RULE-SET,ban_program_ad,🛑 广告拦截

  # AI 服务（最高优先，确保走美国节点）
  - RULE-SET,openai,🤖 AI服务
  - RULE-SET,anthropic,🤖 AI服务
  - RULE-SET,claude,🤖 AI服务
  - RULE-SET,gemini,🤖 AI服务
  - RULE-SET,copilot,🤖 AI服务
  - RULE-SET,perplexity,🤖 AI服务
  - DOMAIN-SUFFIX,cursor.sh,🤖 AI服务
  - DOMAIN-SUFFIX,x.ai,🤖 AI服务
  - DOMAIN-SUFFIX,grok.com,🤖 AI服务
  - DOMAIN-SUFFIX,openrouter.ai,🤖 AI服务

  # GitHub
  - RULE-SET,github_rules,🐙 GitHub

  # Google CN 直连（地图、翻译国内版等）
  - RULE-SET,google_cn,🎯 全球直连

  # 微软服务
  - RULE-SET,microsoft,Ⓜ️ 微软服务

  # 苹果服务
  - RULE-SET,apple,🍎 苹果服务

  # Telegram
  - RULE-SET,telegram,📲 Telegram

  # YouTube
  - RULE-SET,youtube,📹 YouTube

  # 流媒体
  - RULE-SET,netflix,🎬 流媒体
  - RULE-SET,proxy_media,🎬 流媒体

  # B站直连
  - RULE-SET,bilibili,🎯 全球直连

  # GFW 代理列表
  - RULE-SET,gfw_list,🚀 节点选择

  # 国内域名/IP 直连
  - RULE-SET,china_domain,🎯 全球直连
  - RULE-SET,china_company_ip,🎯 全球直连,no-resolve
  - GEOIP,LAN,🎯 全球直连,no-resolve
  - GEOIP,CN,🎯 全球直连,no-resolve

  # 兜底
  - MATCH,🐟 漏网之鱼
