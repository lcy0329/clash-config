# =============================================================================
# Clash Verge Rev — 全局 Merge 配置
# 替代 subconverter + ACL4SSR_Online_Full，订阅直接填原始链接即可
# 多订阅、多设备通用，规则每日自动更新
#
# 用法：Clash Verge Rev → 订阅右键「编辑文件」无关，
#       到「设置 → Merge / 全局扩展配置」粘贴，或在订阅的 Merge 字段引用本文件。
# =============================================================================

profile:
  store-selected: true   # 记住手动选择的节点，重启/更新订阅后不重置
  store-fake-ip: true    # 保留 fake-ip 映射缓存，避免重启后短暂解析问题

